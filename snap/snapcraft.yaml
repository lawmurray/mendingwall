name: mendingwall
title: Mending Wall
version: git
adopt-info: mendingwall

base: core24
grade: stable
confinement: devmode

parts:
  mendingwall:
    plugin: meson
    meson-parameters:
      - --prefix=/usr
      - --buildtype=release
      - -Dc_args=-DBUILD_FOR_SNAP
    source: .
    parse-info:
      - usr/share/metainfo/org.indii.mendingwall.metainfo.xml

slots:
  mendingwall:
    interface: dbus
    bus: session
    name: org.indii.mendingwall

  mendingwallcli:
    interface: dbus
    bus: session
    name: org.indii.mendingwall.cli

  mendingwalld:
    interface: dbus
    bus: session
    name: org.indii.mendingwall.watch

plugs:
  dconf:
    interface: dbus
    bus: session
    name: ca.desrt.dconf

apps:
  mendingwall:
    command: usr/bin/mendingwall
    desktop: usr/share/applications/org.indii.mendingwall.desktop
    common-id: org.indii.mendingwall
    extensions:
      - gnome
    slots:
      - mendingwall
    plugs:
      - dconf

  mendingwallcli:
    command: usr/bin/mendingwallcli
    common-id: org.indii.mendingwall.cli
    extensions:
      - gnome
    slots:
      - mendingwallcli
    plugs:
      - dconf

  mendingwalld:
    command: usr/bin/mendingwalld
    common-id: org.indii.mendingwall.watch
    extensions:
      - gnome
    slots:
      - mendingwalld
    plugs:
      - dconf
