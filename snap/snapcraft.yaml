name: mendingwall
title: Mending Wall
version: git
adopt-info: mendingwall

base: core24
grade: stable
confinement: strict

parts:
  mendingwall:
    plugin: meson
    meson-parameters:
      - "--buildtype=release"
      - "--prefix=/usr"
      - "-Dc_args=-DBUILD_FOR_SNAP"
    source: .
    parse-info:
      - usr/share/metainfo/org.indii.mendingwall.metainfo.xml
    build-packages:
      - git

slots:
  dbus-mendingwall:
    interface: dbus
    bus: session
    name: org.indii.mendingwall

  dbus-mendingwallcli:
    interface: dbus
    bus: session
    name: org.indii.mendingwall.cli

  dbus-mendingwalld:
    interface: dbus
    bus: session
    name: org.indii.mendingwall.watch

plugs:
  # dconf-dbus:
  #   interface: dbus
  #   bus: session
  #   name: ca.desrt.dconf

  # dconf-db:
  #   interface: personal-files
  #   write:
  #     - $HOME/.config/dconf/user

  # directories monitored for .desktop files of installed applications
  system-applications:
    interface: system-files
    read:
      - /var/lib/flatpak/exports/share/applications
      - /var/lib/snapd/desktop/applications
      - /usr/local/share/applications
      - /usr/share/applications

  # directory to which updated .desktop files are written for tidied
  # applications
  user-applications:
    interface: personal-files
    write:
      - $HOME/.local/share/applications

  # configuration files for desktop environments that are saved and restored
  # as part of the mend themes feature
  user-config:
    interface: personal-files
    write:
      - $HOME/.config/gtk-3.0
      - $HOME/.config/gtk-4.0
      - $HOME/.config/gtkrc
      - $HOME/.config/gtkrc-2.0
      - $HOME/.config/monitors.xml
      - $HOME/.config/kcminputrc
      - $HOME/.config/kdeglobals
      - $HOME/.config/kglobalshortcutsrc
      - $HOME/.config/kwinrc
      - $HOME/.config/kwinoutputconfig.json
      - $HOME/.config/plasmashellrc
      - $HOME/.config/plasma-org.kde.plasma.desktop-appletsrc
      - $HOME/.config/systemsettingsrc
      - $HOME/.config/Trolltech.conf
      - $HOME/.config/xsettingsd

apps:
  mendingwall:
    command: usr/bin/mendingwall
    desktop: usr/share/applications/org.indii.mendingwall.desktop
    common-id: org.indii.mendingwall
    extensions:
      - gnome
    slots:
      - dbus-mendingwall
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - gsettings
    #   - dconf-dbus
    #   - dconf-db

  mendingwallcli:
    command: usr/bin/mendingwallcli
    common-id: org.indii.mendingwall.cli
    extensions:
      - gnome
    slots:
      - dbus-mendingwallcli
    plugs:
      - desktop
      - desktop-legacy
      - gsettings
    #   - dconf-dbus
    #   - dconf-db

  mendingwalld:
    command: usr/bin/mendingwalld
    common-id: org.indii.mendingwall.watch
    extensions:
      - gnome
    slots:
      - dbus-mendingwalld
    plugs:
      # - dconf-dbus
      # - dconf-db
      - desktop
      - desktop-legacy
      - gsettings
      - system-applications
      - user-applications
      - user-config
