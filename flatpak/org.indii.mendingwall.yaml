id: org.indii.mendingwall
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: mendingwall

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11

  # autostart requires; portal is not used as it does not support the earlier
  # init phases needed to restore themes before first use
  - --filesystem=xdg-config/autostart:create
  - --filesystem=xdg-config/plasma-workspace/env:create

  # dconf backend for GSettings, so can save and restore themes
  - --filesystem=xdg-run/dconf
  - --filesystem=xdg-config/dconf:rw
  - --talk-name=ca.desrt.dconf
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules/
  - --env=GSETTINGS_BACKEND=dconf

  # read access to config files of desktop environments to save
  - --filesystem=xdg-config:ro

  # when restoring a theme, write access is needed to xdg-config to create,
  # modify and potentially remove config files, but this is not permitted;
  # flatpak-spawn is used for restore script only, in order to run outside
  # of the sandbox to achieve this
  - --talk-name=org.freedesktop.Flatpak

  # application directories, so can tidy menus
  - --filesystem=xdg-data/applications:create
  - --filesystem=xdg-data/flatpak/exports/share/applications:ro
  - --filesystem=/var/lib/flatpak/exports/share/applications:ro
  - --filesystem=/var/lib/snapd/desktop/applications:ro
  - --filesystem=host-os:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'

modules:

  - name: dconf
    buildsystem: meson
    config-opts:
      - -Dbash_completion=false
      - -Dman=false
      - -Dsystemduserunitdir=' '
    cleanup:
      - /include
      - /lib/pkgconfig
      - /libexec
      - /share/dbus-1
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/dconf
        tag: 0.40.0

  - name: libportal
    buildsystem: meson
    config-opts:
      - "--buildtype=release"
      - "-Ddocs=false"
      - "-Dtests=false"
      - "-Dvapi=false"
    sources:
      - type: git
        url: https://github.com/flatpak/libportal
        tag: 0.9.0

  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - "*"
    sources:
      - type: git
        url: https://gitlab.gnome.org/jwestman/blueprint-compiler
        tag: v0.16.0

  - name: mendingwall
    buildsystem: meson
    config-opts:
      - "-Dc_args=-DBUILD_FOR_FLATPAK"
    sources:
      - type: dir
        path: ../
    post-install:
      # for autostart files, which will launch from outside flatpak, wrap
      # calls to mendingwalld with flatpak run...
      - sed -i -E "s,/app/bin/mendingwalld,flatpak run --branch=master --arch=$FLATPAK_ARCH --command=/app/bin/mendingwalld org.indii.mendingwall,g" /app/share/mendingwall/org.indii.mendingwall.watch.desktop

      # ...and calls to mendingwalld with flatpak-spawn
      - sed -i -E "s,/app/bin/mendingwallcli,flatpak run --branch=master --arch=$FLATPAK_ARCH --command="flatpak-spawn --host /app/bin/mendingwallcli" org.indii.mendingwall,g" /app/share/mendingwall/org.indii.mendingwall.restore.desktop /app/share/mendingwall/org.indii.mendingwall.restore.sh
